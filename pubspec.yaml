name: avataaars
description: >-
  Flutter widget that renders avataaars-style cartoon avatars from
  customizable attributes using SVG.
version: 0.1.0
repository: https://github.com/bramp/flutter_avataaars
publish_to: none

environment:
  sdk: ^3.11.1
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4

flutter:
  assets:
    - lib/assets/
    - lib/assets/eyes/
    - lib/assets/eyebrows/
    - lib/assets/mouths/
    - lib/assets/clothing/
    - lib/assets/graphic_clothing/
    - lib/assets/top/
    - lib/assets/accessories/
    - lib/assets/facial_hair/

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
